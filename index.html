<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaming DCR</title>
  <meta name="theme-color" content="#061b3a" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">

  <!-- Splash -->
  <div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#061b3a] text-white">
    <div class="w-24 h-24 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-3xl font-bold shadow-2xl mb-5">
      DCR
    </div>
    <h1 class="text-3xl font-extrabold tracking-tight">Streaming DCR</h1>
    <p class="text-slate-300 mt-2 text-sm">Catálogo premium</p>
    <div class="flex gap-2 mt-6">
      <span class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></span>
      <span class="w-3 h-3 rounded-full bg-white animate-pulse"></span>
      <span class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></span>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="bg-[#061b3a] text-white p-4 sticky top-0 shadow-lg">
      <div class="max-w-4xl mx-auto flex items-center justify-between gap-3">
        <div>
          <h1 class="text-xl font-extrabold">Streaming DCR</h1>
          <p class="text-xs text-slate-300">Premium Ecuador</p>
        </div>
        <a
          href="https://wa.link/4x8ojw"
          target="_blank"
          rel="noopener noreferrer"
          class="bg-green-500 px-4 py-2 rounded-xl text-sm font-bold"
        >
          WhatsApp
        </a>
      </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
      <section class="bg-white rounded-3xl shadow p-5">
        <h2 class="text-2xl font-extrabold">Catálogo de servicios</h2>
        <p class="text-slate-500 text-sm mt-1">Busca tu servicio</p>

        <input
          id="search"
          type="text"
          placeholder="Buscar Netflix, Disney+, Spotify..."
          class="w-full mt-4 p-3 rounded-2xl border border-slate-300"
          oninput="renderServices()"
        />

        <div id="catalog" class="grid gap-4 mt-5"></div>
      </section>

      <section class="bg-white rounded-3xl shadow p-5">
        <h2 class="text-2xl font-extrabold">Métodos de pago</h2>
        <p class="text-slate-500 text-sm mt-1">Toca para copiar</p>

        <div id="banks" class="grid gap-4 mt-5"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full text-sm font-bold shadow-2xl">
    Copiado correctamente
  </div>

  <script>
    const services = [
      { name: "Netflix 4K", plans: ["Completa 30 días - $7", "Completa 60 días - $13", "Completa 90 días - $17", "1 perfil 80 días - $5"] },
      { name: "Disney+ Premium", plans: ["Completa 30 días - $8"] },
      { name: "Spotify Premium", plans: ["1 mes - $4", "3 meses - $9"] },
      { name: "Prime Video", plans: ["Completa 30 días - $4"] },
      { name: "YouTube Premium", plans: ["1 mes - $4", "3 meses - $9"] },
      { name: "Servicio Técnico", plans: ["Cambio de pantalla - Desde $25", "Cambio de batería - Desde $15", "Pin de carga - $10", "Mantenimiento - $10"] }
    ];

    const banks = [
      { bank: "Banco Pichincha", owner: "DARWIN CAÑAR", number: "2206498570", type: "Ahorros", id: "1716552888" },
      { bank: "Banco Guayaquil", owner: "DARWIN CAÑAR", number: "20380913", type: "Ahorros", id: "" }
    ];

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 1500);
    }

    function copyText(text) {
      const area = document.createElement("textarea");
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      document.body.removeChild(area);
      showToast("Copiado correctamente");
    }

    function renderServices() {
      const q = document.getElementById("search").value.toLowerCase().trim();
      const filtered = services.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.plans.some(p => p.toLowerCase().includes(q))
      );

      const html = filtered.map(service => {
        const plans = service.plans.map(plan =>
          '<div class="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-medium">' + plan + '</div>'
        ).join("");

        return (
          '<div class="bg-slate-50 border border-slate-200 rounded-3xl p-4">' +
            '<h3 class="text-lg font-extrabold mb-3">' + service.name + '</h3>' +
            '<div class="grid gap-2">' + plans + '</div>' +
            '<a href="https://wa.link/4x8ojw" target="_blank" rel="noopener noreferrer" class="block mt-4 bg-[#061b3a] text-white text-center py-3 rounded-2xl font-bold">Consultar / Solicitar</a>' +
          '</div>'
        );
      }).join("");

      document.getElementById("catalog").innerHTML = html;
    }

    function renderBanks() {
      const html = banks.map(bank => {
        const idHtml = bank.id
          ? '<button onclick="copyText(\'' + bank.id + '\')" class="mt-2 text-sm font-bold text-blue-700">Copiar cédula: ' + bank.id + '</button>'
          : '';

        return (
          '<div class="bg-slate-50 border border-slate-200 rounded-3xl p-4">' +
            '<h3 class="text-lg font-extrabold">' + bank.bank + '</h3>' +
            '<p class="text-sm text-slate-600 mt-1">Titular: ' + bank.owner + '</p>' +
            '<p class="text-sm text-slate-600">Tipo: ' + bank.type + '</p>' +
            '<button onclick="copyText(\'' + bank.number + '\')" class="mt-4 w-full bg-white border border-slate-300 rounded-2xl p-3 text-left">' +
              '<div class="text-xs text-slate-500">Número de cuenta</div>' +
              '<div class="text-xl font-extrabold">' + bank.number + '</div>' +
            '</button>' +
            idHtml +
          '</div>'
        );
      }).join("");

      document.getElementById("banks").innerHTML = html;
    }

    function startApp() {
      renderServices();
      renderBanks();

      setTimeout(function () {
        const splash = document.getElementById("splash");
        const app = document.getElementById("app");
        splash.style.display = "none";
        app.classList.remove("hidden");
      }, 1500);
    }

    startApp();
  </script>
</body>
</html>
