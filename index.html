<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D.C.R entretenimiento ec</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial, sans-serif; }

/* splash animado */
#splash {
  animation: fadeOut 1s ease forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}
</style>
</head>

<body class="bg-slate-100">

<!-- SPLASH -->
<div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#061b3a] text-white">

<div class="w-28 h-28 rounded-full bg-white/10 flex items-center justify-center text-2xl font-bold">
D.C.R
</div>

<h1 class="text-3xl font-bold mt-4 text-center">D.C.R entretenimiento ec</h1>
<p class="text-slate-300 mt-2">Catálogo premium</p>

</div>

<!-- APP (SIEMPRE VISIBLE) -->
<div id="app">

<header class="bg-[#061b3a] text-white p-4 flex justify-between items-center">
  <div>
    <h1 class="font-bold">D.C.R entretenimiento ec</h1>
    <p class="text-xs text-slate-300">Premium Ecuador</p>
  </div>

  <a href="https://wa.link/4x8ojw" class="bg-green-500 px-4 py-2 rounded-xl font-bold">
    WhatsApp
  </a>
</header>

<main class="p-4 space-y-6">

<!-- BUSCADOR -->
<section class="bg-white p-4 rounded-xl shadow">
  <h2 class="font-bold text-lg">Catálogo</h2>

  <input id="search" placeholder="Buscar..."
  class="w-full mt-2 p-3 border rounded-xl"
  oninput="render()">

  <div id="catalog" class="mt-4 space-y-4"></div>
</section>

<!-- BANCOS -->
<section class="space-y-4">

<h2 class="font-bold text-lg">Métodos de pago</h2>

<!-- PICHINCHA -->
<div class="bg-yellow-400 p-4 rounded-xl text-black">
  <b>Banco Pichincha</b>
  <div>Cuenta: 2206498570</div>
  <div>Nombre: Darwin Cañar</div>
  <div>Cédula: 1716552888</div>
</div>

<!-- GUAYAQUIL -->
<div class="bg-pink-500 p-4 rounded-xl text-white">
  <b>Banco Guayaquil</b>
  <div>Cuenta: 20380913</div>
  <div>Nombre: Darwin Cañar</div>
</div>

</section>

</main>

</div>

<script>
const services = [
  {name:"Netflix 4K", plans:["30 días $7","60 días $13","90 días $17"]},
  {name:"Disney+", plans:["30 días $8"]},
  {name:"Spotify", plans:["1 mes $4"]},
  {name:"Prime Video", plans:["30 días $4"]},
];

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  services
  .filter(s => s.name.toLowerCase().includes(search))
  .forEach(s=>{
    html += `
    <div class="bg-slate-50 p-4 rounded-xl shadow">
      <b>${s.name}</b>
      ${s.plans.map(p=>`<div>${p}</div>`).join("")}
      <a href="https://wa.link/4x8ojw"
      class="block mt-3 bg-[#061b3a] text-white text-center p-2 rounded-xl">
      Solicitar
      </a>
    </div>`;
  });

  document.getElementById("catalog").innerHTML = html;
}

render();
</script>

</body>
</html>
