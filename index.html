<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D.C.R entretenimiento ec</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;font-family:Arial}
.card{transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.15)}
.fade-in{animation:fade .6s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>

</head>
<body>

<!-- HEADER -->
<header class="sticky top-0 bg-[#061b3a] text-white p-4 flex justify-between items-center">
<b>D.C.R entretenimiento ec</b>
<a href="#catalogo" class="bg-amber-400 text-black px-4 py-2 rounded-xl font-bold">Comprar</a>
</header>

<!-- HERO -->
<section class="p-6 text-white bg-gradient-to-br from-[#061b3a] to-[#12407d]">
<h2 class="text-3xl font-bold">Streaming y cuentas premium 🔥</h2>
<p class="mt-2">Compra rápida por WhatsApp</p>
<a href="#catalogo" class="mt-4 inline-block bg-green-500 px-5 py-3 rounded-xl font-bold">COMPRAR AHORA</a>
</section>

<!-- CATALOGO -->
<section id="catalogo" class="p-4">
<h2 class="text-2xl font-bold mb-4">Catálogo</h2>

<input id="search" placeholder="Buscar..." 
class="w-full p-3 rounded-xl border mb-4"
oninput="render()">

<div id="catalog" class="grid gap-4"></div>

</section>

<script>

const WHATSAPP = "593992064254";

function buy(product,plan){
let msg=`Hola quiero comprar ${product} - ${plan}`;
window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
}

const services = [

{
name:"Netflix 4K",
plans:[
"30 días - $7",
"60 días - $12",
"90 días - $17"
]
},

{
name:"Disney+ Premium",
plans:["30 días - $8"]
},

{
name:"Spotify Premium",
plans:[
"30 días - $4",
"90 días - $9.50"
]
},

{
name:"Flujo TV",
plans:[
"1 mes - $6.50",
"4 meses - $20",
"9 meses - $40",
"17 meses - $70"
]
},

{
name:"Prime Video",
plans:["30 días - $4.50"]
},

{
name:"YouTube Premium",
plans:[
"30 días - $4",
"90 días - $9.50"
]
},

{
name:"HBO Max",
plans:["30 días - $4"]
},

{
name:"Crunchyroll",
plans:["30 días - $4"]
},

{
name:"Paramount+",
plans:["30 días - $5"]
},

{
name:"Canva Pro",
plans:["3 meses - $1"]
}

];

function render(){

let search=document.getElementById("search").value.toLowerCase();

let html="";

services
.filter(s=>s.name.toLowerCase().includes(search))
.forEach(s=>{

html+=`
<div class="card bg-white p-5 rounded-2xl fade-in">

<h3 class="text-xl font-bold mb-3">${s.name}</h3>

${s.plans.map(p=>`
<div class="flex justify-between items-center bg-slate-100 p-3 rounded-xl mb-2">
<span>${p}</span>
<button onclick="buy('${s.name}','${p}')" 
class="bg-[#061b3a] text-white px-3 py-2 rounded-lg text-sm font-bold">
Comprar
</button>
</div>
`).join("")}

<button onclick="buy('${s.name}','info')" 
class="w-full mt-3 bg-green-500 text-white p-3 rounded-xl font-bold">
COMPRAR AHORA 🔥
</button>

</div>
`;

});

document.getElementById("catalog").innerHTML=html;

}

render();

</script>

</body>
</html>
