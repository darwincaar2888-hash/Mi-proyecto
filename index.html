<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D.C.R entretenimiento ec</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-900">

<header class="bg-[#061b3a] text-white p-4 flex justify-between items-center">
  <h1 class="font-bold">D.C.R entretenimiento ec</h1>
  <a href="https://wa.me/593992064254" class="bg-green-500 px-4 py-2 rounded-xl font-bold">
    WhatsApp
  </a>
</header>

<section class="p-4">
  <div class="bg-[#061b3a] text-white p-6 rounded-3xl">
    <h2 class="text-3xl font-bold">Streaming premium</h2>
    <button onclick="scrollToCatalog()" class="mt-4 bg-yellow-400 text-black px-4 py-2 rounded-xl font-bold">
      Ver catálogo
    </button>
  </div>
</section>

<section id="catalogo" class="p-4">
  <input id="search" oninput="render()" placeholder="Buscar..." class="w-full p-3 border rounded-xl mb-4">

  <div id="catalog" class="grid gap-4"></div>
</section>

<section class="p-4">
  <h2 class="text-xl font-bold mb-2">Métodos de pago</h2>

  <div class="bg-yellow-400 p-4 rounded-xl mb-3">
    Banco Pichincha<br>
    Cuenta: 2206498570<br>

    <button onclick="copyText('2206498570')" class="mt-2 bg-black text-white px-3 py-1 rounded">
      Copiar
    </button>
  </div>

  <div class="bg-pink-500 text-white p-4 rounded-xl">
    Banco Guayaquil<br>
    Cuenta: 20380913<br>

    <button onclick="copyText('20380913')" class="mt-2 bg-white text-black px-3 py-1 rounded">
      Copiar
    </button>
  </div>
</section>

<a href="https://wa.me/593992064254"
   class="fixed bottom-5 right-5 bg-green-500 text-white px-5 py-4 rounded-full font-bold shadow-xl">
  WhatsApp
</a>

<script>
const NUMBER = "593992064254";

function openWhats(product, plan) {
  let text = `Hola, quiero solicitar ${product} - ${plan}`;
  let url = `https://wa.me/${NUMBER}?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
}

function scrollToCatalog() {
  document.getElementById("catalogo").scrollIntoView({behavior:"smooth"});
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copiado");
}

const services = [
  {
    name: "Netflix",
    plans: ["30 días $7","60 días $13","90 días $17"]
  },
  {
    name: "Disney+",
    plans: ["30 días $8"]
  },
  {
    name: "Spotify",
    plans: ["1 mes $4","3 meses $9"]
  },
  {
    name: "Flujo TV",
    plans: ["1 mes $6.50","4 meses $20","9 meses $40","17 meses $70"]
  },
  {
    name: "Prime Video",
    plans: ["30 días $4"]
  },
  {
    name: "YouTube Premium",
    plans: ["1 mes $4","3 meses $9"]
  },
  {
    name: "HBO Max",
    plans: ["1 mes $4"]
  },
  {
    name: "Crunchyroll",
    plans: ["1 mes $4"]
  },
  {
    name: "Paramount+",
    plans: ["1 mes $3"]
  },
  {
    name: "Canva Pro",
    plans: ["1 mes $4","3 meses $10"]
  },
  {
    name: "Servicio Técnico",
    plans: ["Pantalla desde $25","Batería desde $15","Mantenimiento $10"]
  }
];

function render() {
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  services
    .filter(s => s.name.toLowerCase().includes(search))
    .forEach(s => {
      html += `
        <div class="bg-white p-4 rounded-xl shadow">
          <h3 class="text-xl font-bold">${s.name}</h3>

          ${s.plans.map(p => `
            <div class="flex justify-between mt-2">
              <span>${p}</span>
              <button onclick="openWhats('${s.name}','${p}')"
                class="bg-[#061b3a] text-white px-3 py-1 rounded">
                Pedir
              </button>
            </div>
          `).join("")}
        </div>
      `;
    });

  document.getElementById("catalog").innerHTML = html;
}

render();
</script>

</body>
</html>
