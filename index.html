<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming DCR</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-900">

<!-- SPLASH -->
<div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#061b3a] text-white">
  <div class="w-24 h-24 rounded-full bg-white/10 flex items-center justify-center text-3xl font-bold mb-5">
    DCR
  </div>
  <h1 class="text-3xl font-bold">Streaming DCR</h1>
  <p class="text-slate-300 mt-2">Catálogo premium</p>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header class="bg-[#061b3a] text-white p-4 flex justify-between items-center">
  <div>
    <h1 class="font-bold text-lg">Streaming DCR</h1>
    <p class="text-xs text-slate-300">Premium Ecuador</p>
  </div>

  <a href="https://wa.link/4x8ojw" target="_blank"
    class="bg-green-500 px-4 py-2 rounded-xl font-bold">
    WhatsApp
  </a>
</header>

<main class="p-4 space-y-6">

<section class="bg-white p-5 rounded-2xl shadow">
  <h2 class="text-xl font-bold">Catálogo</h2>

  <input id="search" type="text" placeholder="Buscar..."
    class="w-full mt-3 p-3 border rounded-xl"
    oninput="render()">

  <div id="catalog" class="mt-4 space-y-4"></div>
</section>

</main>

</div>

<script>
const services = [
  {name:"Netflix 4K", plans:["30 días $7","60 días $13","90 días $17","Perfil $5"]},
  {name:"Disney+", plans:["30 días $8"]},
  {name:"Spotify", plans:["1 mes $4","3 meses $9"]},
  {name:"Prime Video", plans:["30 días $4"]},
];

function render(){
  let search = document.getElementById("search").value.toLowerCase();
  let html = "";

  services
  .filter(s => s.name.toLowerCase().includes(search))
  .forEach(s=>{
    html += `
    <div class="bg-slate-50 p-4 rounded-xl shadow">
      <b>${s.name}</b>
      ${s.plans.map(p=>`<div>${p}</div>`).join("")}
      <a href="https://wa.link/4x8ojw"
      class="block mt-3 bg-[#061b3a] text-white text-center p-2 rounded-xl">
      Solicitar
      </a>
    </div>`;
  });

  document.getElementById("catalog").innerHTML = html;
}

render();


// 🔥 FIX IMPORTANTE (NO SE QUEDA PEGADO)
setTimeout(function() {
  const splash = document.getElementById("splash");
  const app = document.getElementById("app");

  if (splash) splash.style.display = "none";
  if (app) app.classList.remove("hidden");
}, 1200);

</script>

</body>
</html>
